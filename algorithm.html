<!DOCTYPE html>
<html lang="da">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Visualisering af Suffix Algoritmen">
    <link rel="icon" type="image/png" href="images/logo.png">
    <title>الگوریتم</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Amiri:wght@400;700&family=JetBrains+Mono:wght@300;400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        .algo-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--white);
            padding: 8rem 2rem 4rem;
            font-family: 'Inter', sans-serif;
        }

        .algo-header {
            text-align: center;
            margin-bottom: 4rem;
            max-width: 600px;
        }

        .algo-title {
            font-family: 'Amiri', serif;
            font-size: 3.5rem;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        .algo-controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 4rem;
            width: 100%;
            max-width: 500px;
        }

        .algo-input {
            flex: 1;
            padding: 1rem;
            border: 1px solid #e2e8f0;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .algo-input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .algo-btn {
            padding: 1rem 2rem;
            background: var(--primary-color);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            transition: all 0.3s ease;
        }

        .algo-btn:hover {
            background: var(--gold);
        }

        /* Suffix Display */
        .suffix-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
        }

        .suffix-item {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.2rem;
            color: var(--primary-color);
            padding: 0.8rem 2rem;
            border-radius: 4px;
            background: #f8fafc;
            border: 1px solid #f1f5f9;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translateY(20px);
            width: fit-content;
            min-width: 200px;
            text-align: center;
            letter-spacing: 2px;
        }

        .suffix-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .suffix-item span {
            color: var(--gold);
            font-weight: 600;
        }

        .suffix-item:hover {
            border-color: var(--gold);
            background: var(--white);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body class="subpage">
    <nav class="nav nav-internal" id="nav">
        <div class="nav-container">
            <div class="nav-brand">
                <a href="index.html">
                    <div class="logo-text">
                        <div class="logo-main">A.S.U.</div>
                        <div class="logo-sub">Stiftet 2026</div>
                    </div>
                </a>
            </div>
            <div class="nav-links">
                <a href="om.html" class="nav-link">OM</a>
                <a href="nyheder.html" class="nav-link">NYHEDER</a>
                <a href="ressourcer.html" class="nav-link">RESSOURCER</a>
                <a href="kontakt.html" class="nav-link">KONTAKT</a>
                <a href="key.html" class="nav-link">کلید</a>
            </div>
        </div>
    </nav>

    <main class="algo-wrapper">
        <div class="algo-controls">
            <input type="text" id="algoInput" class="algo-input" maxlength="25">
            <button onclick="generateSuffixes()" class="algo-btn">تجزیه</button>
        </div>

        <div class="suffix-container" id="suffixContainer">
            <!-- Suffixes will appear here -->
        </div>
    </main>

    <script>
        function generateSuffixes() {
            const input = document.getElementById('algoInput');
            const container = document.getElementById('suffixContainer');
            const word = input.value.trim().toUpperCase();

            if (!word) return;

            // Clear previous
            container.innerHTML = '';

            // Generate all suffixes
            const suffixes = [];
            for (let i = 0; i < word.length; i++) {
                suffixes.push(word.substring(i));
            }

            // Alphabetical sort (Suffix Array concept)
            suffixes.sort();

            // Display them with delay
            suffixes.forEach((suffix, index) => {
                const item = document.createElement('div');
                item.className = 'suffix-item';

                // Highlight the first letter to emphasize sorting
                item.innerHTML = `<span>${suffix[0]}</span>${suffix.substring(1)}`;

                container.appendChild(item);

                setTimeout(() => {
                    item.classList.add('visible');
                }, index * 100);
            });
        }

        // Enter key support
        document.getElementById('algoInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') generateSuffixes();
        });
    </script>
    <script src="script.js"></script>
</body>

</html>
