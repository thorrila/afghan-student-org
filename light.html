<!DOCTYPE html>
<html lang="da">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/logo.png">
    <title>نور</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --uv-deep: #0a0015;
            /* Subliminal Blacklight Base */
            --uv-violet: #4b0082;
            /* Deep Fluorescent Violet */
            --uv-neon: #9d4edd;
            /* Electric Purple */
            --uv-blue: #00f5ff;
            /* Fluorescent Blue Glow */
            --room-bg: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--room-bg);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background 2.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.on {
            background: var(--uv-violet);
        }

        .stage {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        /* Turrell-style Light Source */
        .light-source {
            position: relative;
            width: 35vh;
            height: 35vh;
            border-radius: 50%;
            background: #ffffff;
            filter: blur(2px);
            transition: all 1.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
            box-shadow:
                0 0 40px rgba(0, 0, 0, 0.02),
                inset 0 0 30px rgba(0, 0, 0, 0.01);
        }

        /* When ON, it becomes the fluorescent core */
        body.on .light-source {
            background: #ffffff;
            filter: blur(8px);
            transform: scale(1.05);
            box-shadow:
                0 0 100px #ffffff,
                0 0 250px var(--uv-blue);
        }

        /* Immersive UV Halo Layers */
        .halo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            pointer-events: none;
            transition: all 2.5s ease-in-out;
            opacity: 0;
        }

        .halo-inner {
            width: 70vh;
            height: 70vh;
            background: radial-gradient(circle, rgba(0, 245, 255, 0.4) 0%, transparent 75%);
            filter: blur(60px);
            z-index: 5;
            mix-blend-mode: screen;
        }

        .halo-outer {
            width: 150vh;
            height: 150vh;
            background: radial-gradient(circle, var(--uv-deep) 0%, var(--uv-neon) 50%, transparent 90%);
            filter: blur(120px);
            z-index: 1;
        }

        body.on .halo {
            opacity: 1;
        }

        body.on .halo-inner {
            transform: translate(-50%, -50%) scale(1.4);
            opacity: 0.6;
        }

        body.on .halo-outer {
            transform: translate(-50%, -50%) scale(1.6);
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <main class="stage" onclick="toggleLight()">
        <div class="halo halo-outer"></div>
        <div class="halo halo-inner"></div>
        <div class="light-source"></div>
    </main>

    <script>
        function toggleLight() {
            document.body.classList.toggle('on');
        }
    </script>
</body>

</html>
