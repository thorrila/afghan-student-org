    <style>
        body {
            background: #0d0d0d;
            overflow: hidden;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #gelimCanvas {
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            border: 1px solid #1a1a1a;
            image-rendering: pixelated;
        }

        .ui-overlay {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: var(--white);
            pointer-events: none;
            z-index: 100;
        }

        .ui-title {
            font-family: 'Amiri', serif;
            font-size: 3rem;
            color: var(--gold);
            margin-bottom: 0.5rem;
            opacity: 0.8;
        }

        .ui-hint {
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
        }

        .weaver-info {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            text-align: right;
            font-family: 'Inter', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            color: var(--gold);
            opacity: 0.4;
        }

        /* The 'Thread' effect */
        @keyframes weaveGlow {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        .nav-internal {
            background: transparent !important;
            border: none !important;
        }

    <canvas id="gelimCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gelimCanvas');
        const ctx = canvas.getContext('2d');

        // Rug Dimensions (Classic portrait ratio)
        const cols = 51;
        const rows = 71;
        const cellSize = 12;

        canvas.width = cols * cellSize;
        canvas.height = rows * cellSize;

        // Colors
        const RED = '#800000'; // Deep Madder Red
        const GOLD = '#D4AF37'; // Antique Gold
        const NAVY = '#1B263B'; // Indigo / Navy
        const CREAM = '#F5F5DC'; // Silk / Wool Cream

        // State
        let weaverX, weaverY, woven, selectedPattern;
        const patterns = ['MEDALLION', 'GEOMETRIC', 'TRIBAL'];

        function resetGame() {
            weaverX = Math.floor(cols / 2);
            weaverY = Math.floor(rows / 2);
            woven = Array.from({ length: rows }, () => Array(cols).fill(false));
            selectedPattern = patterns[Math.floor(Math.random() * patterns.length)];

            // Mark starting 8x8 square
            for (let dy = 0; dy < 8; dy++) {
                for (let dx = 0; dx < 8; dx++) {
                    if (weaverY + dy < rows && weaverX + dx < cols) {
                        woven[weaverY + dy][weaverX + dx] = true;
                    }
                }
            }
            draw();
        }

        function checkCompletion() {
            let totalWoven = 0;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (woven[r][c]) totalWoven++;
                }
            }

            // If 98% of the rug is finished, move to next
            const completion = totalWoven / (cols * rows);
            if (completion > 0.98) {
                setTimeout(resetGame, 500);
            }
        }

        // Masterpiece Palette
        const P_RED = '#8B0000';    // Deep Persian Red
        const P_NAVY = '#1B263B';   // Indigo/Navy
        const P_CREAM = '#FFFDD0';  // Aged Silk/Cream
        const P_GOLD = '#D4AF37';   // Antique Gold
        const P_TEAL = '#006D77';   // Persian Teal
        const P_SALMON = '#E29578'; // Madder Salmon

        function getPatternColor(x, y) {
            const midX = (cols - 1) / 2;
            const midY = (rows - 1) / 2;
            const dX = x - midX;
            const dY = y - midY;
            const dist = Math.max(Math.abs(dX) / midX, Math.abs(dY) / midY);
            const r = Math.sqrt(dX * dX + dY * dY);
            const angle = Math.atan2(dY, dX);

            // 1. ELABORATE MULTI-LAYER BORDERS
            if (dist > 0.97) return P_GOLD; // Fringe
            if (dist > 0.93) return P_NAVY; // Outer Guardian
            if (dist > 0.82 && dist < 0.91) {
                // Secondary border with "floral" zig-zag
                const zigzag = (Math.floor(x / 3) + Math.floor(y / 3)) % 2;
                return zigzag ? P_RED : P_CREAM;
            }
            if (dist > 0.78 && dist < 0.81) return P_GOLD; // Inner Guardian

            // 2. PATTERN SPECIFIC LOGIC
            if (selectedPattern === 'MEDALLION') {
                // COMPLEX "GUL" (Central Medallion)
                // Using rotational symmetry (8-fold)
                const petals = Math.abs(Math.sin(angle * 8)) * 10;
                if (r < 4) return P_GOLD;
                if (r < 12 + petals) {
                    if (r < 8) return P_NAVY;
                    return (Math.floor(r) % 2 === 0) ? P_CREAM : P_RED;
                }

                // Field vines (Corner motifs)
                const vine = Math.sin(x * 0.4) * Math.cos(y * 0.4);
                if (vine > 0.8) return P_TEAL;
                if (vine < -0.8) return P_GOLD;

                return P_CREAM; // Red field in example, but cream looks high-end
            }

            else if (selectedPattern === 'GEOMETRIC') {
                // TILE SYSTEM
                const tile = (Math.floor(x / 8) + Math.floor(y / 8)) % 2;
                if (r < 20) {
                    // Central Octagon
                    const oct = Math.abs(dX) + Math.abs(dY);
                    if (oct < 6) return P_GOLD;
                    if (oct < 15) return (x + y) % 2 ? P_NAVY : P_CREAM;
                    return P_RED;
                }
                return tile ? P_RED : P_SALMON;
            }

            else { // PICTORIAL / FLOWING
                // DENSE BOTANICAL NOISE
                const noise = Math.sin(x * 0.6) + Math.cos(y * 0.6) + Math.sin(r * 0.3);
                if (r < 10) return P_GOLD; // Small central star

                if (noise > 1.2) return P_TEAL;
                if (noise < -1.2) return P_SALMON;
                if (Math.abs(dX) < 2 || Math.abs(dY) < 2) return P_NAVY;

                return P_RED;
            }
        }

        function draw() {
            ctx.fillStyle = '#0d0d0d';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (woven[r][c]) {
                        ctx.fillStyle = getPatternColor(c, r);
                        // Add a slight "woven" texture by drawing small grid lines
                        ctx.fillRect(c * cellSize + 1, r * cellSize + 1, cellSize - 2, cellSize - 2);
                    }
                }
            }

            // Draw Weaver (Active Head - 8x8 area)
            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = 2;
            ctx.strokeRect(weaverX * cellSize, weaverY * cellSize, cellSize * 8, cellSize * 8);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.fillRect(weaverX * cellSize, weaverY * cellSize, cellSize * 8, cellSize * 8);
        }

        // Movement Logic
        const keys = {};
        window.addEventListener('keydown', (e) => { keys[e.key] = true; });
        window.addEventListener('keyup', (e) => { keys[e.key] = false; });

        function moveWeaver() {
            let moved = false;
            // High-speed movement: checks keys every loop iteration
            if (keys['ArrowUp'] && weaverY > 0) { weaverY--; moved = true; }
            if (keys['ArrowDown'] && weaverY < rows - 8) { weaverY++; moved = true; }
            if (keys['ArrowLeft'] && weaverX > 0) { weaverX--; moved = true; }
            if (keys['ArrowRight'] && weaverX < cols - 8) { weaverX++; moved = true; }

            if (moved) {
                for (let dy = 0; dy < 8; dy++) {
                    for (let dx = 0; dx < 8; dx++) {
                        woven[weaverY + dy][weaverX + dx] = true;
                    }
                }
                draw();
                checkCompletion();
            }
        }

        // Loop at a fast interval for smooth holding
        setInterval(moveWeaver, 20);

        // Initialize
        resetGame();
    </script>
</body>

</html>
