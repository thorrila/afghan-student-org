<!DOCTYPE html>
<html lang="da">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="En leg med hemmeligheder">
    <link rel="icon" type="image/png" href="images/logo.png">
    <title>رمز عبور</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Amiri:wght@400;700&family=JetBrains+Mono:wght@300;400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        .password-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--white);
            padding: 2rem;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .password-header {
            text-align: center;
            margin-bottom: 5rem;
        }

        .password-title {
            font-family: 'Amiri', serif;
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        .input-container {
            position: relative;
            width: 100%;
            max-width: 400px;
        }

        .secret-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #e2e8f0;
            padding: 1rem 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            text-align: center;
            letter-spacing: 0.5em;
            color: var(--primary-color);
            transition: all 0.3s ease;
        }

        .secret-input:focus {
            outline: none;
            border-color: var(--gold);
        }

        /* Visualization Area */
        .echo-container {
            margin-top: 4rem;
            height: 100px;
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        .char-echo {
            font-family: 'Amiri', serif;
            font-size: 2.5rem;
            color: var(--gold);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .char-echo.visible {
            opacity: 0.4;
            transform: translateY(0);
        }

        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
            z-index: 1000;
        }

        .success-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .success-content {
            text-align: center;
            font-family: 'Cormorant Garamond', serif;
        }

        .success-word {
            font-family: 'Amiri', serif;
            font-size: 6rem;
            color: var(--gold);
            margin-bottom: 1rem;
        }

        .success-meaning {
            font-size: 1.5rem;
            font-style: italic;
            color: var(--primary-color);
            letter-spacing: 0.1em;
        }
    </style>
</head>

<body class="subpage">
    <nav class="nav nav-internal" id="nav">
        <div class="nav-container">
            <div class="nav-brand">
                <a href="index.html">
                    <div class="logo-text">
                        <div class="logo-main">A.S.U.</div>
                        <div class="logo-sub">Stiftet 2026</div>
                    </div>
                </a>
            </div>
            <div class="nav-links">
                <a href="om.html" class="nav-link">OM</a>
                <a href="nyheder.html" class="nav-link">NYHEDER</a>
                <a href="ressourcer.html" class="nav-link">RESSOURCER</a>
                <a href="kontakt.html" class="nav-link">KONTAKT</a>
                <a href="key.html" class="nav-link active">کلید</a>
            </div>
        </div>
    </nav>

    <main class="password-wrapper">
        <header class="password-header">
        </header>

        <div class="input-container">
            <input type="password" id="secretInput" class="secret-input" placeholder="••••••" autocomplete="off">
        </div>

        <div class="echo-container" id="echoContainer">
            <!-- Echo characters appear here -->
        </div>
    </main>

    <div class="success-overlay" id="successOverlay">
        <div class="success-content">
            <div class="success-word">مومو</div>
            <div class="success-meaning">momo</div>
        </div>
    </div>

    <script>
        const input = document.getElementById('secretInput');
        const echoContainer = document.getElementById('echoContainer');
        const overlay = document.getElementById('successOverlay');
        const TARGET = "momo"; // The "secret" key locally

        input.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            updateEcho(val);

            if (val === TARGET) {
                overlay.classList.add('active');
            }
        });

        function updateEcho(str) {
            echoContainer.innerHTML = '';
            // Only show the last few characters to avoid clutter
            const displayStr = str.slice(-8);

            for (let char of displayStr) {
                const span = document.createElement('div');
                span.className = 'char-echo visible';
                // Transform into a random Persian letter for "encryption" visual
                const persianChars = "ابپتثجچحخدذرزژسشصضطظعغفقکگلمنوهی";
                span.innerText = persianChars[Math.floor(Math.random() * persianChars.length)];
                echoContainer.appendChild(span);
            }
        }

        function reset() {
            overlay.classList.remove('active');
            input.value = '';
            echoContainer.innerHTML = '';
        }

        // Focus on start
        window.onload = () => input.focus();
    </script>
    <script src="script.js"></script>
</body>

</html>
